spring.application.name=chatbot
groq.api.key=${GROQ_API_KEY}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chatbot}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.mvc.favicon.enabled=false
logging.level.org.springframework.web.servlet.mvc.method.annotation=ERROR

# Railway sets PORT automatically
server.port=${PORT:8080}

# Base URL - defaults to frontend on localhost, override with APP_BASE_URL on Railway
app.base-url=${APP_BASE_URL:http://localhost:5173}